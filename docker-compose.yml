services:
  db-job:
    image: mysql:8.0
    container_name: db-job
    restart: always
    environment:
      MYSQL_DATABASE: job_db
      MYSQL_ROOT_PASSWORD: ${DB_PASS_ROOT}
      MYSQL_USER: ${DB_USER}        # El usuario que usará tu App Spring Boot
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "127.0.0.1:3307:3306"
    networks:
      - job-net
    volumes:
      - ./mysql_data:/var/lib/mysql

  job-management-service:
    build: .
    container_name: job-management-service
    depends_on:
      - db-job
    restart: always
    ports:
      - "8083:8083"
    environment:
      # Aquí usas la IP pública o el host que te de Hostinger para MySQL
      - SPRING_DATASOURCE_URL=jdbc:mysql://db-job:3306/job_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - job-net

networks:
  job-net:
    driver: bridge
