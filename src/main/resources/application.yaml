server:
  port: 8083
  error:
    include-message: always

spring:
  application:
    name: job-management-service

  datasource:
    url: jdbc:mysql://localhost/job_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api-docs

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
  upload:
#    dir: "C:/hmbrandt/uploads/signatures/"
    dir: ${UPLOAD_DIR:C:/hmbrandt/uploads/signatures/}

logging:
  level:
    org.springframework.web.servlet.resource: TRACE
    org.springframework.core.io: TRACE
